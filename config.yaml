# ─── CyberMesh v7.0 "Smart Router" Configuration ───
# Identical on both nodes. A/B testing: change 'engine' and 'mode'.

codec:
  engine: huffman              # OPTIONS: huffman | mux_grid
  codebook_size: 333k          # OPTIONS: 4k | 333k
  mode: keyword                # OPTIONS: keyword | strict_only | legacy
                               # keyword    = Smart Router (strict + lossy)
                               # strict_only = always lossless, paginate overflow
                               # legacy     = v5.0 behavior (constrained rewrite)

router:
  strict_threshold: 180        # max encoded bytes before router fires
  classify_categories:         # router classification labels
    - command
    - status
    - narrative
    - data
    - briefing
  lossy_categories:            # which categories use lossy keyword mode
    - status
    - briefing
  lossless_categories:         # which categories paginate lossless
    - command
    - narrative
    - data

keyword:
  max_keywords: 20             # max keywords extracted per message
  preserve_numbers: true       # always pass numbers through exactly
  preserve_negation: true      # always keep: not, no, never, none, dont, cant
  preserve_names: true         # keep proper nouns (capitalized words)

pagination:
  max_packet_payload: 180      # usable bytes per LoRa packet (after headers)
  inter_packet_delay_s: 10     # seconds between paginated chunks
  page_format: bracket         # OPTIONS: bracket "[1/3]" | header_byte

context:
  window_size: 4               # conversation exchanges to keep per sender
  anchor_first: true           # always keep first exchange (Operator pattern)

lemonade:
  base_url: http://localhost:8000
  model: test01
  timeout_s: 45
  warmup_on_start: true

radio:
  port: auto                   # serial port or 'auto'
  node_name: Liberty-Node-02

experiment:
  name: G                      # experiment letter for log filenames
  messages_per_node: 10
  runs: 2                      # number of codec comparison runs

logging:
  dir: ./logs
  format: markdown             # OPTIONS: markdown | json | both

testing:
  mock_llm: false              # true = hardcoded LLM responses for CI/offline
                               # false = live calls to Lemonade at base_url

# ─── Legacy v5.0 compat fields (used when mode: legacy) ───
port: auto
custom_portnum: 256
trigger_word: "Hi"
timeout_s: 45
model_name: "test01"
llm_base_url: "http://localhost:8000"
messages_per_node: 10
conversation_seed: |
  You are a mesh network monitoring agent for Lawrence Township, NJ.
  A flood warning has been issued for the area.
  Coordinate with the other agent to check sensor status, assess conditions, and plan emergency response.

  RULES:
  - Be concise. Respond in one or two short sentences.
  - Plain text only. No markdown, no bullet points, no special formatting.
  - No quotation marks around your response.
  - Use simple, common English words.
  - Be direct and specific. Include numbers when reporting data.
pretokenizer: true
llm_codec: false
fallback_threshold: 0.70
