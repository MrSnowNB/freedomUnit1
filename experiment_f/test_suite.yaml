# ─── Stress Tests ───
# Rapid-fire sequences to detect persona drift across sustained load.
# 40 per node (20 encode + 20 decode), 80 total across both nodes.

stress:
  description: "Rapid-fire encode/decode to detect persona drift under sustained load"
  encode_messages:
    - "Flood waters approaching the main power station"
    - "Emergency crews dispatched to the east side"
    - "Water pump station number 4 has failed"
    - "Residents on Maple Avenue ordered to evacuate"
    - "Bridge on Route 1 closed due to debris"
    - "National Guard requested for sandbagging operations"
    - "Hospital generator running on emergency fuel reserves"
    - "Communication relay on hilltop operational"
    - "School bus depot flooded vehicles cannot deploy"
    - "Red Cross shelter accepting arrivals at township hall"
    - "Sewer system overflow detected at junction 12"
    - "Police checkpoint established at the county line"
    - "Volunteer firefighters needed at the south levee"
    - "Water treatment plant operating at reduced capacity"
    - "Drone footage confirms new breach in north levee"
    - "Propane tanks secured at the industrial park"
    - "Ambulance response time increased to 25 minutes"
    - "Ham radio operators providing backup communication"
    - "Floodgates opened at the reservoir to reduce pressure"
    - "All clear issued for the west side residential area"

  decode_messages:
    - "water near the main power place"
    - "help team sent to east side"
    - "water push place number 4 has stopped"
    - "people on tree road told to go"
    - "way on road 1 closed from things in water"
    - "army help asked for sand work"
    - "hospital power running on last fuel"
    - "talk point on high place working"
    - "school car place under water car can not go"
    - "help place taking people at town building"
    - "water system over flow found at point 12"
    - "police stop set at the area line"
    - "free fire help needed at south wall"
    - "water clean place working at less than full"
    - "air look say new break in north wall"
    - "gas hold safe at the work area"
    - "medical car time now 25 minute"
    - "radio people giving other way to talk"
    - "water gate open at the water hold to help"
    - "all clear for west side home area"

  checks:
    - "no meta-loop phrases in any response"
    - "no encode framing in any encode response"
    - "no decode noise in any decode response"
    - "persona consistent across full sequence"
