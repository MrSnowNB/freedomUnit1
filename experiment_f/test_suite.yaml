# ─── CyberMesh Experiment F — Test Suite ───
# Reuses Experiment E scenario (Lawrence Township flood warning)
# 20 encode + 20 decode + stress tests = 80 total per node
# Architect decision: reuse Experiment E's message style for apples-to-apples

metadata:
  version: "1.0"
  experiment: "F"
  description: "Codec harness validation — encode/decode + stress"
  scenario: "Lawrence Township flood warning — mesh network monitoring"
  gate_threshold:
    meta_loop_max: 0          # zero tolerance for persona breaks
    encode_framing_max_pct: 10  # FAIL if >10% of raw outputs have framing
    decode_noise_max_pct: 10    # FAIL if >10% of raw outputs have noise
    codebook_hit_rate_min: 0.70 # minimum hit rate for encode outputs

# ─── Encode Test Cases ───
# Input: natural language messages (flood warning scenario)
# Expected: space-separated codebook tokens ONLY
# expect_no: patterns that MUST NOT appear in raw output

encode:
  - id: ENC-001
    input: "Meet at north bridge 0900"
    expect_no: ["Translated", "Encoded", "Here's", "Would you like"]
    expect_format: "space-separated tokens only"

  - id: ENC-002
    input: "All clear sector 7"
    expect_no: ["Output:", "Result:", "The encoded"]
    expect_format: "space-separated tokens only"

  - id: ENC-003
    input: "Turbidity at Sensor 7 is now at 95 percent significantly above normal"
    expect_no: ["Translated", "Here's", "Would you like", "I can"]
    expect_format: "space-separated tokens only"

  - id: ENC-004
    input: "Sensor 10 is at 7 point 5 feet all residents near the middle school should evacuate immediately"
    expect_no: ["Encoded:", "Output:", "Let me", "Sure"]
    expect_format: "space-separated tokens only"

  - id: ENC-005
    input: "The backup power system is operational and battery levels are at 89 percent"
    expect_no: ["Translated", "Result:", "Here is"]
    expect_format: "space-separated tokens only"

  - id: ENC-006
    input: "Water level rising fast at the south dam need emergency crews now"
    expect_no: ["Would you like", "Shall I", "Let me"]
    expect_format: "space-separated tokens only"

  - id: ENC-007
    input: "Confirmed three families evacuated from River Road area"
    expect_no: ["Encoded", "Here's", "Output:"]
    expect_format: "space-separated tokens only"

  - id: ENC-008
    input: "Road closed on Route 206 between Cherry Hill and Lawrenceville"
    expect_no: ["Translated", "I can", "Would you"]
    expect_format: "space-separated tokens only"

  - id: ENC-009
    input: "Generator fuel level at 45 percent estimate 6 hours remaining"
    expect_no: ["Result:", "Here's the", "Let me"]
    expect_format: "space-separated tokens only"

  - id: ENC-010
    input: "National Weather Service extended the flood warning until midnight"
    expect_no: ["Encoded:", "Output:", "Translated"]
    expect_format: "space-separated tokens only"

  - id: ENC-011
    input: "All mesh nodes are responding with good signal strength"
    expect_no: ["Here's", "Would you like", "I can also"]
    expect_format: "space-separated tokens only"

  - id: ENC-012
    input: "Need medical supplies at the community center by 1400"
    expect_no: ["Translated", "Encoded", "Sure"]
    expect_format: "space-separated tokens only"

  - id: ENC-013
    input: "Bridge inspection complete no structural damage found"
    expect_no: ["Output:", "Result:", "Here is"]
    expect_format: "space-separated tokens only"

  - id: ENC-014
    input: "Power outage reported in the downtown grid sector 3"
    expect_no: ["Would you like", "Let me", "I'd be happy"]
    expect_format: "space-separated tokens only"

  - id: ENC-015
    input: "Requesting helicopter for aerial survey of the flood zone"
    expect_no: ["Translated:", "Encoded:", "Here's"]
    expect_format: "space-separated tokens only"

  - id: ENC-016
    input: "Temperature dropping to 35 degrees tonight risk of ice on roads"
    expect_no: ["Output:", "Result:", "Would you like"]
    expect_format: "space-separated tokens only"

  - id: ENC-017
    input: "Emergency shelter at the high school can hold 200 more people"
    expect_no: ["Translated", "Here's the", "I can"]
    expect_format: "space-separated tokens only"

  - id: ENC-018
    input: "Sandbagging crew reports levee is holding at current water level"
    expect_no: ["Encoded:", "Let me", "Sure"]
    expect_format: "space-separated tokens only"

  - id: ENC-019
    input: "Cell tower on Oak Street lost power switching to battery backup"
    expect_no: ["Output:", "Result:", "Would you"]
    expect_format: "space-separated tokens only"

  - id: ENC-020
    input: "Drone survey shows flooding has receded 2 feet in the last hour"
    expect_no: ["Translated", "Here's", "I'd be happy"]
    expect_format: "space-separated tokens only"

